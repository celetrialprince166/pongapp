<div class="rating-box">
    <div class="rating-box-background-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
    </div>

    <h3 class="rating-title">ELO RATING</h3>

    <div class="rating-main">
        <span class="rating-number">{{user?.current_rating || '1000'}}</span>
    </div>

    @if (ratingChange() !== 0) {
        <div class="rating-trend" [class.positive]="ratingChange() > 0" [class.negative]="ratingChange() < 0">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                @if (ratingChange() > 0) {
                    <polyline points="18 15 12 9 6 15"></polyline>
                } @else {
                    <polyline points="6 9 12 15 18 9"></polyline>
                }
            </svg>
            <span class="trend-value">{{ratingChange() > 0 ? '+' : ''}}{{ratingChange()}}</span>
        </div>
    }

    <p class="rank-text">RANK {{rank()}}</p>
</div>
