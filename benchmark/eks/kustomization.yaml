apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# EKS overlay on top of the generic k8s/ base. The base manifests are referenced,
# never copied, so the local/minikube set stays the single source of truth.
namespace: table-tennis

resources:
  - ../../k8s/namespace.yaml
  - ../../k8s/resource-quota.yaml
  - ../../k8s/limit-range.yaml
  - ../../k8s/rbac/service-account.yaml
  - ../../k8s/rbac/role.yaml
  - ../../k8s/rbac/role-binding.yaml
  - ../../k8s/configmaps/env-config.yaml
  - ../../k8s/frontend/frontend-configmap.yaml
  # data tier
  - ../../k8s/postgres/service.yaml
  - ../../k8s/postgres/statefulset.yaml
  - ../../k8s/redis/deployment.yaml
  - ../../k8s/redis/service.yaml
  # app tier
  - ../../k8s/backend/pvc-media.yaml
  - ../../k8s/backend/service.yaml
  - ../../k8s/backend/deployment.yaml
  - ../../k8s/frontend/frontend-service.yaml
  - ../../k8s/frontend/frontend-deployment.yaml
  # EKS-specific additions
  - storageclass-gp3.yaml         # default class (Delete) for backend media/static
  - storageclass-gp3-retain.yaml  # Retain class for the Postgres DB volume
  - ingress-alb.yaml

# NOTE: secrets are applied separately (they are gitignored):
#   kubectl apply -f k8s/secrets/db-credentials.yaml -f k8s/secrets/app-secrets.yaml
# The original k8s/ingress/ingress.yaml (nginx) and k8s/postgres/pvc.yaml
# (standalone hostpath PVC) are intentionally NOT referenced here.

# Repoint the Docker Hub dev images at the prod ECR repos.
# newTag is a PLACEHOLDER: CI stamps the git short SHA here at deploy time
# (e.g. `kustomize edit set image ...:=<sha>`), mirroring the ECS task-def policy
# of never relying on :latest. Left as `latest` only so the overlay builds for a
# manual smoke test; do not ship `latest` from CI.
images:
  - name: franzjameskaba/ttl-backend
    newName: 648637468459.dkr.ecr.eu-west-1.amazonaws.com/pongapp-backend
    newTag: latest # CI overrides with the git SHA
  - name: franzjameskaba/ttl-frontend
    newName: 648637468459.dkr.ecr.eu-west-1.amazonaws.com/pongapp-frontend
    newTag: latest # CI overrides with the git SHA

patches:
  # Relax namespace PodSecurity enforce restricted->baseline (nginx frontend runs
  # as root on :80; parity with ECS which had no PSS). See the patch file header.
  - target:
      kind: Namespace
      name: table-tennis
    path: patch-namespace-pss.yaml
  # backend ALB target-group health check -> /api/health/ (Django 404s on "/")
  - target:
      kind: Service
      name: backend
    path: patch-backend-svc-healthcheck.yaml
  # Postgres StatefulSet volumeClaimTemplate -> gp3 (EBS CSI)
  - target:
      kind: StatefulSet
      name: postgres
    path: patch-postgres-storageclass.yaml
  # backend media + static PVCs -> gp3
  - target:
      kind: PersistentVolumeClaim
      name: backend-media-pvc
    path: patch-pvc-gp3.yaml
  - target:
      kind: PersistentVolumeClaim
      name: backend-static-pvc
    path: patch-pvc-gp3.yaml
  # backend probes -> /api/health/
  - target:
      kind: Deployment
      name: backend
    path: patch-backend-probes.yaml
  # backend -> 1 replica (RWO/EBS media+static PVCs can't multi-attach)
  - target:
      kind: Deployment
      name: backend
    path: patch-backend-replicas.yaml
  # frontend backend-resolution env
  - target:
      kind: Deployment
      name: frontend
    path: patch-frontend-env.yaml
