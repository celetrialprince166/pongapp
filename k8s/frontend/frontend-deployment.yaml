apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: table-tennis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: franzjameskaba/ttl-frontend:latest
        ports:
        - containerPort: 80
        # Health checks - use root path since nginx serves Angular
        livenessProbe:
          httpGet:
            path: /
            port: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
        # Resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
