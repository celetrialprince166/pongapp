# Example only — copy to app-secrets.yaml and fill with your own base64 value.
# The real app-secrets.yaml is gitignored. In EKS (Phase 4) this is replaced by
# AWS Secrets Manager via the External Secrets Operator / IRSA — secrets never live in git.
#   echo -n 'your-django-secret-key' | base64
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: table-tennis
  labels:
    app: table-tennis
type: Opaque
data:
  DJANGO_SECRET_KEY: <base64-django-secret-key>
