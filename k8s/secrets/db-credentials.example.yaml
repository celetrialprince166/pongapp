# Example only — copy to db-credentials.yaml and fill with your own base64 values.
# The real db-credentials.yaml is gitignored. In EKS (Phase 4) this is replaced by
# AWS Secrets Manager via the External Secrets Operator / IRSA — secrets never live in git.
#   echo -n 'your_value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: table-tennis
  labels:
    app: table-tennis
type: Opaque
data:
  POSTGRES_DB: <base64-db-name>
  POSTGRES_USER: <base64-db-user>
  POSTGRES_PASSWORD: <base64-db-password>
  DB_NAME: <base64-db-name>
  DB_USER: <base64-db-user>
  DB_PASSWORD: <base64-db-password>
