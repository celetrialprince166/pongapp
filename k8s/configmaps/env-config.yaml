apiVersion: v1
kind: ConfigMap
metadata:
  name: env-config
  namespace: table-tennis
  labels:
    app: table-tennis
data:
  DJANGO_SETTINGS_MODULE: "table_tennis_app.settings"
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*,localhost,127.0.0.1,table-tennis.local"
  CORS_ALLOW_ALL_ORIGINS: "False"
  CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost:80,http://table-tennis.local"
  USE_POSTGRES: "True"
  DB_HOST: "postgres.table-tennis.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "table_tennis_db"
  DB_USER: "ttl_user"
  DB_SSLMODE: "prefer"
  USE_S3: "False"
  REDIS_HOST: "redis.table-tennis.svc.cluster.local"
  REDIS_PORT: "6379"
